<app-analysis-workbench
  [tree]="tree()"
  [selectedNodeId]="selectedNodeId()"
  [currentFen]="currentFen()"
  [side]="side()"
  [blackPerspective]="blackPerspective()"
  [lastMove]="lastMove()"
  [arrows]="arrows()"
  [boardPositionVersion]="boardPositionVersion()"
  [analysis]="analysis()"
  [engineVisible]="engineVisible()"
  [showFlipBoard]="true"
  [canGoBackward]="canGoBackward()"
  [canGoForward]="canGoForward()"
  treeTitle="Move tree"
  [treeRootLabel]="loadedFromGame() ? 'Game start' : 'Loaded position'"
  [deleteDisabled]="deleteDisabled()"
  [deleting]="false"
  (boardMove)="boardMove.emit($event)"
  (nodeSelected)="nodeSelected.emit($event)"
  (goStart)="goStart.emit()"
  (goPrevious)="goPrevious.emit()"
  (goNext)="goNext.emit()"
  (goEnd)="goEnd.emit()"
  (flipBoard)="flipBoard.emit()"
  (deleteSelectedSubtree)="deleteSelectedSubtree.emit()"
>
  @if (showInitialPositionInput()) {
    <app-initial-position-input
      analysisWorkbenchSideBeforeTree
      [error]="initialPositionError()"
      (load)="loadInitialPosition.emit($event)"
    />
  }

  <app-course-position-suggestions-widget
    analysisWorkbenchSideExtra
    [fen]="currentFen()"
    (moveSelected)="boardMove.emit($event.moveUci)"
  />
</app-analysis-workbench>
