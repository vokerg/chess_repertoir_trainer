@if (store.botChallengeOpen()) {
  <div class="bot-challenge-overlay" (click)="store.closeBotChallengeDialog()">
    <section
      class="bot-challenge-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="bot-challenge-title"
      (click)="$event.stopPropagation()"
    >
      <header class="dialog-header">
        <div>
          <p class="eyebrow">Lichess</p>
          <h2 id="bot-challenge-title">Challenge bot</h2>
        </div>
        <button type="button" class="secondary" (click)="store.closeBotChallengeDialog()">Close</button>
      </header>

      @if (store.botChallengeOptionsLoading()) {
        <p class="status-note">Loading bots...</p>
      } @else {
        <div class="challenge-grid">
          <label>
            Bot
            <select
              [ngModel]="store.botChallengeUsername()"
              (ngModelChange)="store.setBotChallengeUsername($event)"
            >
              @for (bot of store.botChallengeOptions(); track bot.username) {
                <option [value]="bot.username">{{ bot.label }}</option>
              }
            </select>
          </label>

          <label>
            Color
            <select
              [ngModel]="store.botChallengeColor()"
              (ngModelChange)="store.setBotChallengeColor($event)"
            >
              <option value="white">White</option>
              <option value="black">Black</option>
              <option value="random">Random</option>
            </select>
          </label>

          <label>
            Minutes
            <input
              type="number"
              min="1"
              step="1"
              [ngModel]="store.botChallengeLimit() / 60"
              (ngModelChange)="store.setBotChallengeLimit($event * 60)"
            />
          </label>

          <label>
            Increment
            <input
              type="number"
              min="0"
              step="1"
              [ngModel]="store.botChallengeIncrement()"
              (ngModelChange)="store.setBotChallengeIncrement($event)"
            />
          </label>
        </div>
      }

      @if (store.botChallengeError(); as error) {
        <p class="status-error">{{ error }}</p>
      }

      <footer class="dialog-actions">
        <button type="button" class="secondary" (click)="store.closeBotChallengeDialog()">Cancel</button>
        <button
          type="button"
          class="primary"
          [disabled]="!store.canChallengeBot() || store.botChallengeOptionsLoading()"
          (click)="store.submitBotChallenge()"
        >
          {{ store.botChallengeSubmitting() ? 'Creating...' : 'Challenge' }}
        </button>
      </footer>
    </section>
  </div>
}
