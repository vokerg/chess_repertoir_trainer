<section class="section-card stack">
  <div>
    <span class="eyebrow">Move tree variations</span>
    <h3 class="collection-title sublines-title">{{ title() }}</h3>
  </div>

  @if (loading()) {
    <p class="status-note">Loading sublines...</p>
  } @else if (error()) {
    <p class="status-error">{{ error() }}</p>
  } @else if (items().length === 0) {
    <div class="empty-state">No available sublines yet.</div>
  } @else {
    <div class="sublines-table-wrap">
      <table class="sublines-table">
        <thead>
          <tr>
            <th scope="col">Line</th>
            <th scope="col">Moves</th>
            <th scope="col" class="action-column"><span class="visually-hidden">Actions</span></th>
          </tr>
        </thead>
        <tbody>
          @for (item of items(); track item.hash) {
            <tr>
              <td class="line-name">{{ item.lineName }}</td>
              <td class="move-text">{{ item.moveText }}</td>
              <td class="action-cell">
                <app-copyable-line
                  [line]="item.moveText"
                  [buttonOnly]="true"
                  label="Copy"
                  [ariaLabel]="'Copy moves for ' + item.lineName"
                />
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</section>
