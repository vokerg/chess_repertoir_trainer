<section class="games-page stack">
  <app-page-header
    title="Games"
    subtitle="Filter imported games and submit durable indexing, analysis, or tag jobs."
    [stats]="headerStats()"
    [actions]="headerActions()"
  />

  <app-game-filter-panel
    [filters]="store.filters()"
    [facets]="store.facets()"
    [loading]="store.loading()"
    (filtersChange)="store.setFilters($event)"
    (apply)="store.refresh()"
    (reset)="store.resetFilters()"
  />

  <app-games-table
    [games]="store.filteredGames()"
    [loading]="store.loading()"
    [error]="store.error()"
    [tableSubtitle]="store.tableSubtitle()"
    [pageInfo]="store.pageInfo()"
    (refresh)="store.refresh()"
    (loadMore)="store.loadMore()"
    (analyse)="store.analyse($event)"
    (forceReanalyse)="store.forceReanalyse($event)"
    (indexPlies)="store.indexPlies($event)"
  />
</section>
