<section class="game-detail-page stack">
  <app-game-detail-header
    [game]="store.game()"
    [title]="store.gameTitle()"
    [fullRefreshing]="store.fullRefreshing()"
    [aiReviewAvailable]="aiReviewAvailable()"
    [aiReviewGenerated]="aiReviewStore.review() !== null"
    [aiReviewGenerating]="aiReviewStore.status() === 'GENERATING'"
    [aiReviewDisabled]="store.analysisStatusLabel() !== 'Saved'"
    (fullRefresh)="store.fullRefreshGame()"
    (generateAiReview)="generateAiReview()"
  />

  @if (store.error(); as error) {
    <p class="status-error">{{ error }}</p>
  }
  @if (aiReviewStore.error(); as error) {
    <p class="status-error">{{ error }}</p>
  }

  @if (store.loading()) {
    <app-panel title="Loading game">
      <p class="status-note">Loading imported game...</p>
    </app-panel>
  } @else if (store.game(); as game) {
    <app-game-summary
      [game]="game"
      [analysisRun]="store.analysisRun()"
      [analysisStatus]="store.analysisStatusLabel()"
      [analysisSummary]="store.analysisSummaryLabel()"
    />

    <app-game-ai-review-widget
      [review]="aiReviewStore.review()"
    />

    @if (store.tree(); as tree) {
      <app-game-workbench
        [tree]="tree"
        [selectedNodeId]="store.selectedNodeId()"
        [currentFen]="store.currentFen()"
        [side]="store.boardSide()"
        [blackPerspective]="store.blackPerspective()"
        [lastMove]="store.lastMove()"
        [arrows]="store.analysisArrows()"
        [boardPositionVersion]="store.boardPositionVersion()"
        [analysis]="store.engineAnalysis()"
        [savedScoreCpWhite]="store.savedScoreCpWhite()"
        [canGoBackward]="store.canGoBackward()"
        [canGoForward]="store.canGoForward()"
        [deleteDisabled]="!store.canDeleteSelectedSubtree()"
        (boardMove)="store.playBoardMove($event)"
        (nodeSelected)="store.selectNode($event)"
        (goStart)="store.goToStart()"
        (goPrevious)="store.goToPrevious()"
        (goNext)="store.goToNext()"
        (goEnd)="store.goToEnd()"
        (deleteSelectedSubtree)="confirmDeleteSelectedSubtree()"
      />
    }
  }
</section>
