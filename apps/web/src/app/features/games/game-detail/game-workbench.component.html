<app-analysis-workbench
  [tree]="tree()"
  [selectedNodeId]="selectedNodeId()"
  [currentFen]="currentFen()"
  [side]="side()"
  [blackPerspective]="blackPerspective()"
  [lastMove]="lastMove()"
  [arrows]="arrows()"
  [boardPositionVersion]="boardPositionVersion()"
  [analysis]="analysis()"
  [savedScoreCpWhite]="savedScoreCpWhite()"
  [canGoBackward]="canGoBackward()"
  [canGoForward]="canGoForward()"
  boardTitle="Game board"
  boardHelp="Imported moves load as the main branch. Play extra legal moves to explore temporary sidelines."
  treeTitle="Move tree"
  treeHelp="The imported game is the main line. Temporary sidelines appear as you explore."
  dangerTitle="Danger zone"
  dangerHelp="Delete the selected local variation and every continuation below it. Imported game moves cannot be deleted."
  [deleteButtonLabel]="deleting() ? 'Deleting...' : 'Delete selected subtree'"
  [deleteDisabled]="deleteDisabled()"
  [deleting]="deleting()"
  [showDangerZone]="showDangerZone()"
  (boardMove)="boardMove.emit($event)"
  (nodeSelected)="nodeSelected.emit($event)"
  (goStart)="goStart.emit()"
  (goPrevious)="goPrevious.emit()"
  (goNext)="goNext.emit()"
  (goEnd)="goEnd.emit()"
  (analyze)="analyze.emit()"
  (deleteSelectedSubtree)="deleteSelectedSubtree.emit()"
/>
