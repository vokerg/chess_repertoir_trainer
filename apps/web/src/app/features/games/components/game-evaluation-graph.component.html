@if (points().length > 0) {
  <div class="graph-frame">
    <svg class="evaluation-graph" viewBox="0 0 600 180" role="img" aria-label="Imported game evaluation by move">
        <defs>
          <linearGradient id="evaluation-area" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="var(--success)" stop-opacity="0.32" />
            <stop offset="48%" stop-color="var(--accent)" stop-opacity="0.08" />
            <stop offset="52%" stop-color="var(--danger)" stop-opacity="0.08" />
            <stop offset="100%" stop-color="var(--danger)" stop-opacity="0.28" />
          </linearGradient>
        </defs>

        <rect class="advantage-band advantage-band-positive" [attr.x]="horizontalPadding" y="12" [attr.width]="viewboxWidth - horizontalPadding * 2" [attr.height]="zeroY - 12" />
        <rect class="advantage-band advantage-band-negative" [attr.x]="horizontalPadding" [attr.y]="zeroY" [attr.width]="viewboxWidth - horizontalPadding * 2" [attr.height]="zeroY - 12" />
        <text class="scale-label scale-label-positive" [attr.x]="horizontalPadding + 3" y="24">+8</text>
        <text class="scale-label" [attr.x]="horizontalPadding + 3" [attr.y]="zeroY - 5">0.0</text>
        <text class="scale-label scale-label-negative" [attr.x]="horizontalPadding + 3" y="164">−8</text>
        <line class="zero-line" [attr.x1]="horizontalPadding" [attr.x2]="viewboxWidth - horizontalPadding" [attr.y1]="zeroY" [attr.y2]="zeroY" />

        @if (areaPath(); as graphAreaPath) {
          <path class="evaluation-area" [attr.d]="graphAreaPath" />
        }
        @if (path(); as graphPath) {
          <path class="evaluation-line-shadow" [attr.d]="graphPath" />
          <path class="evaluation-line" [attr.d]="graphPath" />
        }

        @for (point of points(); track point.nodeId) {
          <circle
            class="point-hit-target"
            [attr.cx]="point.x"
            [attr.cy]="point.y"
            r="13"
            tabindex="0"
            role="button"
            [attr.aria-label]="'Select move ' + moveLabel(point.plyNumber) + ', evaluation ' + evaluationLabel(point.scoreCp)"
            (click)="nodeSelected.emit(point.nodeId)"
            (keydown.enter)="nodeSelected.emit(point.nodeId)"
            (keydown.space)="selectFromKeyboard($event, point.nodeId)"
          >
            <title>Move {{ moveLabel(point.plyNumber) }}: {{ evaluationLabel(point.scoreCp) }}</title>
          </circle>
        }

        @if (selectedPoint(); as point) {
          <circle class="selected-point-halo" [attr.cx]="point.x" [attr.cy]="point.y" r="7" />
          <circle class="selected-point" [attr.cx]="point.x" [attr.cy]="point.y" r="3.5" />
        }
    </svg>
  </div>
} @else {
  <p class="empty-note">Run game analysis to see the evaluation graph.</p>
}
