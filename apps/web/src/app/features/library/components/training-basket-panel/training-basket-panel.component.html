<app-panel [title]="sourceLabel()" [subtitle]="basketSubtitle()" [stats]="basketStats()" [actions]="basketActions()">
  <div class="mode-group" aria-label="Marathon mode">
    <button type="button" class="secondary" [class.active]="mode() === 'ALL'" (click)="modeChange.emit('ALL')">All</button>
    <button type="button" class="secondary" [class.active]="mode() === 'WEAK_SUBLINES'" (click)="modeChange.emit('WEAK_SUBLINES')">Weak</button>
    <button type="button" class="secondary" [class.active]="mode() === 'UNTRAINED_SUBLINES'" (click)="modeChange.emit('UNTRAINED_SUBLINES')">Untrained</button>
    <button type="button" class="secondary" [class.active]="mode() === 'MIXED_WEAK_UNTRAINED'" (click)="modeChange.emit('MIXED_WEAK_UNTRAINED')">Mixed</button>
  </div>
</app-panel>
