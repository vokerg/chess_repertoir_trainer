<section class="stack">
  <app-page-header title="Study" subtitle="Build a training basket from a repertoire, section, or selected lines." [actions]="headerActions()" />

  <section class="study-browser">
    <div class="study-toolbar">
      <input
        class="study-search"
        [ngModel]="store.searchText()"
        (ngModelChange)="store.searchText.set($event)"
        placeholder="Search repertoires, sections, lines..."
      />
    </div>

    <div class="study-columns">
      <aside class="study-column">
        <app-study-scope-list
          title="Repertoires"
          [items]="courseItems()"
          [selectedId]="store.selectedCourseId()"
          [loading]="store.courseLoading()"
          [error]="store.courseError()"
          emptyText="No repertoires match this search."
          (selectItem)="store.selectCourse($event)"
        />
      </aside>

      <aside class="study-column">
        <app-study-scope-list
          title="Sections"
          [items]="chapterItems()"
          [selectedId]="store.selectedChapterId()"
          [loading]="store.chapterLoading()"
          [error]="store.chapterError()"
          emptyText="Select a repertoire to see sections."
          (selectItem)="store.selectChapter($event)"
        />
      </aside>

      <main class="study-column study-lines-column">
        <app-study-line-list
          [lines]="store.filteredLines()"
          [selectedLineId]="store.selectedLineId()"
          [selectedLineIds]="store.selectedLineIds()"
          [loading]="store.lineLoading()"
          [error]="store.lineError()"
          (selectLine)="store.selectLine($event)"
          (toggleLine)="store.toggleLineSelection($event)"
        />
      </main>

      <app-training-basket-panel
        class="study-column study-basket-column"
        [lineCount]="store.basketLineCount()"
        [activeSublineCount]="store.basketActiveSublineCount()"
        [recentAttempts]="store.basketRecentAttempts()"
        [weakSublineCount]="store.basketWeakSublineCount()"
        [untrainedSublineCount]="store.basketUntrainedSublineCount()"
        [coverageLabel]="store.basketCoverageLabel()"
        [masteryLabel]="store.basketMasteryLabel()"
        [sourceLabel]="store.basketCoverageSourceLabel()"
        [mode]="store.marathonMode()"
        [canStart]="store.canStartBasket()"
        (modeChange)="store.setMarathonMode($event)"
        (start)="store.startSelectedMarathon()"
        (clear)="store.clearLineSelection()"
      />
    </div>
  </section>
</section>
