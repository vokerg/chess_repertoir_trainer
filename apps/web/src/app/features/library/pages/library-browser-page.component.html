<section class="stack">
  <app-page-header
    class="desktop-only"
    title="Study"
    subtitle="Build a training basket from a repertoire, section, or selected lines."
    [actions]="headerActions()"
  />

  <section class="study-browser">
    <div class="study-toolbar desktop-only">
      <input
        class="study-search"
        [ngModel]="store.searchText()"
        (ngModelChange)="store.searchText.set($event)"
        placeholder="Search repertoires, sections, lines..."
      />
    </div>

    <div class="study-columns">
      <aside class="study-column">
        <app-study-scope-list
          title="Repertoires"
          [items]="courseItems()"
          [selectedId]="store.selectedCourseId()"
          [loading]="store.courseLoading()"
          [error]="store.courseError()"
          emptyText="No repertoires match this search."
          (selectItem)="selectCourse($event)"
        />
      </aside>

      <aside class="study-column desktop-only">
        <app-study-scope-list
          title="Sections"
          [items]="chapterItems()"
          [selectedId]="store.selectedChapterId()"
          [loading]="store.chapterLoading()"
          [error]="store.chapterError()"
          emptyText="Select a repertoire to see sections."
          (selectItem)="store.selectChapter($event)"
        />
      </aside>

      <main class="study-column study-lines-column desktop-only">
        <app-study-line-list
          [lines]="store.filteredLines()"
          [selectedLineId]="store.selectedLineId()"
          [selectedLineIds]="store.selectedLineIds()"
          [loading]="store.lineLoading()"
          [error]="store.lineError()"
          (selectLine)="store.selectLine($event)"
          (toggleLine)="store.toggleLineSelection($event)"
        />
      </main>

      <app-training-basket-panel
        class="study-column study-basket-column desktop-only"
        [lineCountLabel]="store.basketLineCountLabel()"
        [lineCount]="store.basketLineCount()"
        [activeSublineCount]="store.basketActiveSublineCount()"
        [recentAttempts]="store.basketRecentAttempts()"
        [weakSublineCount]="store.basketWeakSublineCount()"
        [untrainedSublineCount]="store.basketUntrainedSublineCount()"
        [coverageLabel]="store.basketCoverageLabel()"
        [masteryLabel]="store.basketMasteryLabel()"
        [sourceLabel]="store.basketCoverageSourceLabel()"
        [scope]="store.trainingScope()"
        [canUseCourseScope]="store.canUseCourseScope()"
        [canUseChapterScope]="store.canUseChapterScope()"
        [canUseSelectedLinesScope]="store.canUseSelectedLinesScope()"
        [canStart]="store.canStartBasket()"
        (scopeChange)="store.setTrainingScope($event)"
        (startMode)="store.startSelectedMarathon($event.mode, $event.scope)"
      />
    </div>
  </section>
</section>

@if (mobileLauncherOpen()) {
  <app-study-mobile-launcher
    class="mobile-only"
    [selectedCourse]="store.selectedCourse()"
    [selectedChapter]="store.selectedChapter()"
    [visibleChapters]="store.filteredChapters()"
    [visibleLines]="store.filteredLines()"
    [selectedLineId]="store.selectedLineId()"
    [courseSummary]="courseSummary()"
    [chapterSummary]="chapterSummary()"
    [lineSummary]="lineSummary()"
    (selectChapter)="store.selectChapter($event)"
    (selectLine)="store.selectLine($event)"
    (startTraining)="startTraining($event)"
    (close)="closeMobileLauncher()"
  />
}
