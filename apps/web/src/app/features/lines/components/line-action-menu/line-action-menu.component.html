<div class="action-menu">
  <button type="button" class="secondary" (click)="renameLine.emit(line())">Rename</button>
  <button type="button" class="secondary" (click)="moveLine.emit(line())">Move</button>
  <button type="button" class="secondary" (click)="copyLine.emit(line())">Copy</button>
  <button type="button" class="secondary danger-text" [disabled]="deleting()" (click)="deleteLine.emit(line())">
    {{ deleting() ? 'Deleting...' : 'Delete' }}
  </button>
</div>
