<app-analysis-workbench
  [tree]="tree()"
  [selectedNodeId]="selectedNodeId()"
  [currentFen]="currentFen()"
  [side]="side()"
  [blackPerspective]="blackPerspective()"
  [lastMove]="lastMove()"
  [arrows]="arrows()"
  [boardPositionVersion]="boardPositionVersion()"
  [analysis]="analysis()"
  [engineWarning]="engineWarning()"
  [canGoBackward]="canGoBackward()"
  [canGoForward]="canGoForward()"
  boardTitle="Board workbench"
  boardHelp="Play a move on the board to add it to the selected node. Use the keyboard to move through the main branch."
  treeTitle="Move tree"
  treeHelp="Root is the start position. Green-outlined moves are trained-side moves; softer replies are opponent continuations."
  dangerTitle="Danger zone"
  dangerHelp="Delete the selected move and every continuation below it. The start position cannot be deleted."
  [deleteButtonLabel]="deleting() ? 'Deleting...' : 'Delete selected subtree'"
  [deleteDisabled]="selectedNodeId() === 0 || deleting()"
  [deleting]="deleting()"
  (boardMove)="boardMove.emit($event)"
  (nodeSelected)="nodeSelected.emit($event)"
  (goStart)="goStart.emit()"
  (goPrevious)="goPrevious.emit()"
  (goNext)="goNext.emit()"
  (goEnd)="goEnd.emit()"
  (analyze)="analyze.emit()"
  (deleteSelectedSubtree)="deleteSelectedSubtree.emit()"
>
  <app-line-notes-editor
    analysisWorkbenchSideExtra
    [nodeId]="nodeId()"
    [branchLabelValue]="branchLabel()"
    [commentValue]="comment()"
    [annotationValue]="annotation()"
    [saving]="notesSaving()"
    [saved]="notesSaved()"
    [error]="notesError()"
    (saveNotes)="saveNotes.emit($event)"
  />
</app-analysis-workbench>
