<section class="section-card games-filters" aria-label="Game filters">
  <div class="games-filter-grid">
    <label class="games-field"
      ><span>Account</span
      ><select [ngModel]="filters().accountId" (ngModelChange)="setFilter('accountId', $event)">
        <option value="">All accounts</option>
        @for (account of facets().accounts || []; track facetKey(account)) {
          <option [value]="facetKey(account)">{{ accountLabel(account) }}</option>
        }
      </select></label
    >
    <label class="games-field"
      ><span>Provider</span
      ><select [ngModel]="filters().provider" (ngModelChange)="setFilter('provider', $event)">
        <option value="ALL">Lichess + Chess.com</option>
        <option value="LICHESS">Lichess</option>
        <option value="CHESS_COM">Chess.com</option>
      </select></label
    >
    <label class="games-field"
      ><span>Result</span
      ><select
        [ngModel]="filters().resultForUser"
        (ngModelChange)="setFilter('resultForUser', $event)"
      >
        <option value="">Any result</option>
        <option value="WIN">Win</option>
        <option value="DRAW">Draw</option>
        <option value="LOSS">Loss</option>
      </select></label
    >
    <label class="games-field"
      ><span>Colour</span
      ><select
        [ngModel]="lockedUserColor() || filters().userColor"
        [disabled]="!!lockedUserColor()"
        (ngModelChange)="setFilter('userColor', $event)"
      >
        <option value="">White or Black</option>
        <option value="WHITE">White</option>
        <option value="BLACK">Black</option>
      </select></label
    >
    <label class="games-field"
      ><span>Control</span
      ><select
        [ngModel]="filters().speedCategory"
        (ngModelChange)="setFilter('speedCategory', $event)"
      >
        <option value="">Any control</option>
        <option value="bullet">Bullet</option>
        <option value="blitz,rapid">Blitz + rapid</option>
        <option value="blitz">Blitz</option>
        <option value="rapid">Rapid</option>
        <option value="classical">Classical</option>
        @for (speed of customSpeedFacets(); track facetKey(speed)) {
          <option [value]="facetKey(speed)">{{ facetLabel(speed) }}</option>
        }
      </select></label
    >
    <label class="games-field"
      ><span>Rated</span
      ><select [ngModel]="filters().rated" (ngModelChange)="setFilter('rated', $event)">
        <option value="">Rated or casual</option>
        <option value="true">Rated</option>
        <option value="false">Casual</option>
      </select></label
    >
    <label class="games-field"
      ><span>Analysis</span
      ><select
        [ngModel]="filters().analysisStatus"
        (ngModelChange)="setFilter('analysisStatus', $event)"
      >
        <option value="">Any status</option>
        <option value="NOT_ANALYZED">Not analysed</option>
        <option value="RUNNING">Running</option>
        <option value="COMPLETED">Completed</option>
        <option value="FAILED">Failed</option>
      </select></label
    >
    <label class="games-field"
      ><span>Indexed</span
      ><select
        [ngModel]="filters().plyIndexStatus"
        (ngModelChange)="setFilter('plyIndexStatus', $event)"
      >
        <option value="">Any status</option>
        <option value="NOT_INDEXED">Not indexed</option>
        <option value="INDEXED">Indexed</option>
        <option value="FAILED">Failed</option>
      </select></label
    >
    <div class="games-field tags-field">
      <span>Tags</span>
      <details class="tags-picker">
        <summary>{{ tagSelectionLabel() }}</summary>
        <div class="tags-options">
          <label class="tag-option">
            <input
              type="checkbox"
              [checked]="noTagsSelected()"
              (change)="toggleNoTags($any($event.target).checked)"
            />
            <span>No tags</span>
          </label>
          @for (tag of facets().tags || []; track tagCode(tag)) {
            <label class="tag-option">
              <input
                type="checkbox"
                [disabled]="noTagsSelected()"
                [checked]="isTagSelected(tagCode(tag))"
                (change)="toggleTagCode(tagCode(tag), $any($event.target).checked)"
              />
              <span>{{ facetLabel(tag) }}</span>
            </label>
          }
        </div>
      </details>
    </div>
    <label class="games-field"
      ><span>Time control</span
      ><input
        [ngModel]="filters().timeControl"
        (ngModelChange)="setFilterValue('timeControl', $event)"
        placeholder="e.g. 10+5"
    /></label>
    <label class="games-field"
      ><span>Opponent</span
      ><input
        [ngModel]="filters().opponent"
        (ngModelChange)="setFilterValue('opponent', $event)"
        placeholder="Username"
    /></label>
    <label class="games-field"
      ><span>Opening</span
      ><input
        [ngModel]="filters().openingName"
        (ngModelChange)="setFilterValue('openingName', $event)"
        placeholder="Sicilian, London..."
    /></label>
    <label class="games-field compact"
      ><span>Min accuracy</span
      ><input
        [ngModel]="filters().minAccuracy"
        (ngModelChange)="setFilterValue('minAccuracy', $event)"
        inputmode="decimal"
        placeholder="0"
    /></label>
    <label class="games-field compact"
      ><span>Max accuracy</span
      ><input
        [ngModel]="filters().maxAccuracy"
        (ngModelChange)="setFilterValue('maxAccuracy', $event)"
        inputmode="decimal"
        placeholder="100"
    /></label>
    <label class="games-field compact"
      ><span>Opp. rating &gt;</span
      ><input
        [ngModel]="filters().minOpponentRating"
        (ngModelChange)="setFilterValue('minOpponentRating', $event)"
        inputmode="numeric"
        placeholder="1200"
    /></label>
    <label class="games-field compact"
      ><span>Opp. rating &lt;</span
      ><input
        [ngModel]="filters().maxOpponentRating"
        (ngModelChange)="setFilterValue('maxOpponentRating', $event)"
        inputmode="numeric"
        placeholder="2200"
    /></label>
    <label class="games-field compact"
      ><span>From</span
      ><input type="date" [ngModel]="filters().from" (ngModelChange)="setFilter('from', $event)"
    /></label>
    <label class="games-field compact"
      ><span>To</span
      ><input type="date" [ngModel]="filters().to" (ngModelChange)="setFilter('to', $event)"
    /></label>
  </div>
  <div class="games-filter-actions">
    <button type="button" (click)="apply.emit()" [disabled]="loading()">
      {{ loading() ? 'Loading...' : 'Apply filters' }}</button
    ><button type="button" class="secondary" (click)="reset.emit()" [disabled]="loading()">
      Reset
    </button>
  </div>
</section>
