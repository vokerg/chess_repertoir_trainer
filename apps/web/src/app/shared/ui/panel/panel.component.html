<section
  class="app-panel"
  [class.app-panel-raised]="appearance() === 'raised'"
  [class.app-panel-subtle]="appearance() === 'subtle'"
  [class.app-panel-flat]="appearance() === 'flat'"
  [class.app-panel-compact]="density() === 'compact'"
>
  @if (title() || subtitle() || stats().length || actions().length) {
    <header class="app-panel-header">
      @if (title() || subtitle()) {
        <div class="app-panel-copy">
          @if (title(); as title) {
            <h3 class="app-panel-title">{{ title }}</h3>
          }
          @if (subtitle(); as subtitle) {
            <p class="app-panel-subtitle">{{ subtitle }}</p>
          }
        </div>
      }

      <app-ui-shell-actions [stats]="stats()" [actions]="actions()" />
    </header>
  }

  <div class="app-panel-body">
    <ng-content />
  </div>
</section>
