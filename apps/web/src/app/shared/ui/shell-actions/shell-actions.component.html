@if (stats().length || actions().length) {
  <div class="ui-shell-actions">
    @for (stat of stats(); track stat.id) {
      <div class="ui-shell-stat">
        <span class="ui-shell-stat-label">{{ stat.label }}</span>
        <span class="ui-shell-stat-value">{{ stat.value }}</span>
      </div>
    }

    @for (action of actions(); track action.id) {
      @if (action.link) {
        <a
          class="ui-shell-action"
          [class.ui-shell-action-primary]="appearance(action) === 'primary'"
          [class.ui-shell-action-secondary]="appearance(action) === 'secondary'"
          [class.ui-shell-action-ghost]="appearance(action) === 'ghost'"
          [class.ui-shell-action-danger]="appearance(action) === 'danger'"
          [class.disabled]="action.disabled"
          [attr.aria-disabled]="action.disabled || null"
          [routerLink]="action.disabled ? null : action.link"
        >
          {{ action.label }}
        </a>
      } @else {
        <button
          type="button"
          class="ui-shell-action"
          [class.ui-shell-toggle]="action.kind === 'toggle'"
          [class.active]="action.kind === 'toggle' && action.pressed"
          [class.ui-shell-action-primary]="action.kind !== 'toggle' && appearance(action) === 'primary'"
          [class.ui-shell-action-secondary]="action.kind !== 'toggle' && appearance(action) === 'secondary'"
          [class.ui-shell-action-ghost]="action.kind !== 'toggle' && appearance(action) === 'ghost'"
          [class.ui-shell-action-danger]="action.kind !== 'toggle' && appearance(action) === 'danger'"
          [class.disabled]="action.disabled"
          [attr.aria-pressed]="action.kind === 'toggle' ? action.pressed : null"
          [disabled]="action.disabled"
          (click)="run(action)"
        >
          {{ action.label }}
        </button>
      }
    }
  </div>
}
