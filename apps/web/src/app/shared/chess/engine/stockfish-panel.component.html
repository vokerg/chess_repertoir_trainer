<section class="stockfish-widget" aria-label="Engine lines">
  @if (warning()) {
    <div class="engine-warning-modern">{{ warning() }}</div>
  }

  <div class="stockfish-lines">
    @for (line of lineViewModels(); track line.id) {
      <div class="engine-line-modern stockfish-line-slot">
        <span class="engine-score-modern">{{ line.score }}</span>
        <code>{{ line.moves }}</code>
      </div>
    }

    @if (statusText(); as status) {
      <p class="stockfish-status" [class.status-error]="analysis().error">{{ status }}</p>
    }
  </div>
</section>
