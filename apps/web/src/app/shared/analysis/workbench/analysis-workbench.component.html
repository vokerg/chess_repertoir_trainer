<div class="analysis-workbench">
  <app-panel class="board-panel" [title]="boardTitle()" [subtitle]="boardHelp()">
    <div class="board-stage">
      <app-engine-eval-bar
        [analysis]="analysis()"
        [currentFen]="currentFen()"
        [flipped]="blackPerspective()"
        [savedScoreCpWhite]="savedScoreCpWhite()"
      />
      <div class="board-shell">
        <app-chessground-board
          [fen]="currentFen()"
          [side]="side()"
          [lastMove]="lastMove()"
          [arrows]="boardArrows()"
          [sound]="false"
          [positionVersion]="boardPositionVersion()"
          (move)="boardMove.emit($event)"
        />
      </div>
    </div>

    <app-board-action-toolbar
      [canGoBackward]="canGoBackward()"
      [canGoForward]="canGoForward()"
      [fen]="currentFen()"
      [keyboardHint]="keyboardHint()"
      (goStart)="goStart.emit()"
      (goPrevious)="goPrevious.emit()"
      (goNext)="goNext.emit()"
      (goEnd)="goEnd.emit()"
    />
  </app-panel>

  <div class="workbench-side-stack">
    <app-move-tree-panel
      [tree]="tree()"
      [selectedNodeId]="selectedNodeId()"
      [title]="treeTitle()"
      [help]="treeHelp()"
      [rootLabel]="treeRootLabel()"
      (nodeSelected)="nodeSelected.emit($event)"
    />

    <app-stockfish-panel
      [analysis]="analysis()"
      [currentFen]="currentFen()"
      [warning]="engineWarning()"
      (analyze)="analyze.emit()"
    />

    <ng-content select="[analysisWorkbenchSideExtra]"></ng-content>

    @if (showDangerZone()) {
      <section class="danger-zone">
        <h3 class="workbench-panel-title">{{ dangerTitle() }}</h3>
        <p class="workbench-panel-subtitle">{{ dangerHelp() }}</p>
        <div class="board-action-row">
          <button
            type="button"
            class="danger"
            [disabled]="deleteDisabled() || deleting()"
            (click)="deleteSelectedSubtree.emit()"
          >
            {{ deleteButtonLabel() }}
          </button>
        </div>
      </section>
    }
  </div>
</div>
