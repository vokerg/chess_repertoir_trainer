<section class="workbench-panel move-tree-panel">
  <div class="move-tree-panel-header">
    <div class="move-tree-panel-copy">
      <h3 class="workbench-panel-title">{{ title() }}</h3>
      @if (help(); as helpText) {
        <p class="workbench-panel-subtitle">{{ helpText }}</p>
      }
    </div>

    @if (copyLine()) {
      <app-copy-button
        [value]="copyLine()"
        [label]="copyLabel()"
        [ariaLabel]="copyLabel()"
        buttonClass="secondary"
      />
    }
  </div>

  <app-move-tree
    [tree]="tree()"
    [selectedNodeId]="selectedNodeId()"
    [rootLabel]="rootLabel()"
    [deletionEnabled]="deletionEnabled()"
    [deletionDisabled]="deletionDisabled()"
    (nodeSelected)="nodeSelected.emit($event)"
    (deleteSelectedSubtree)="deleteSelectedSubtree.emit()"
  />
</section>
