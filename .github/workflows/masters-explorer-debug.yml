name: Masters Explorer Debug

on:
  pull_request:

jobs:
  api-test-ranges:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chess_trainer_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d chess_trainer_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:api
      - run: npm run db:migrate --workspace=apps/api
      - name: API tests A-H
        run: cd apps/api && node test/run-range.mjs '' imported-games/
      - name: API tests I-L
        run: cd apps/api && node test/run-range.mjs imported-games/ masters-explorer/
      - name: API tests M-O
        run: cd apps/api && node test/run-range.mjs masters-explorer/ openapi/
      - name: API tests OpenAPI
        run: cd apps/api && node test/run-range.mjs openapi/ repertoire-coverage/
      - name: API tests Repertoire
        run: cd apps/api && node test/run-range.mjs repertoire-coverage/ scenario-training/
      - name: API tests Scenario
        run: cd apps/api && node test/run-range.mjs scenario-training/ training/
      - name: API tests Training-Z
        run: cd apps/api && node test/run-range.mjs training/ zzzz
