name: Masters Explorer Debug

on:
  pull_request:

jobs:
  masters-openapi:
    runs-on: ubuntu-latest
    env:
      CI: true
      DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
      DIRECT_URL: postgresql://unused:unused@localhost:5432/unused
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npm run build:api --silent
      - name: Masters Explorer OpenAPI test
        run: node apps/api/test/openapi/masters-explorer-openapi.test.mjs
