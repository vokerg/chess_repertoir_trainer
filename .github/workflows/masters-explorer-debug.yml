name: Masters Explorer Debug

on:
  pull_request:

jobs:
  masters-openapi:
    runs-on: ubuntu-latest
    env:
      CI: true
      DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
      DIRECT_URL: postgresql://unused:unused@localhost:5432/unused
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npm run build:api --silent
      - name: Masters Explorer OpenAPI test
        id: masters_openapi
        continue-on-error: true
        run: node apps/api/test/openapi/masters-explorer-openapi.test.mjs > masters-openapi.log 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: masters-openapi-log
          path: masters-openapi.log
      - name: Preserve test result
        if: steps.masters_openapi.outcome == 'failure'
        run: exit 1
