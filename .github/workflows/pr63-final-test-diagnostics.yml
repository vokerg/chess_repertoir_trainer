name: PR63 Final Test Diagnostics

on:
  pull_request:
    branches:
      - feature/persistent-game-jobs

permissions:
  contents: write

jobs:
  final-test-diagnostics:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chess_trainer_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d chess_trainer_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
      WEB_API_BASE_URL: /api
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply test query fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/api/test/jobs/job-worker-cancellation.test.mjs')
          content = path.read_text()
          old = 'await transaction.$queryRaw`SELECT pg_sleep(0.15)`;'
          new = 'await transaction.$queryRaw`SELECT 1::int AS "slept" FROM pg_sleep(0.15)`;'
          if old in content:
              path.write_text(content.replace(old, new, 1))
          PY
          if ! git diff --quiet -- apps/api/test/jobs/job-worker-cancellation.test.mjs; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add apps/api/test/jobs/job-worker-cancellation.test.mjs
            git commit -m "test(jobs): use supported lock-race delay query"
            git push origin HEAD:feature/persistent-game-jobs-pr6
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npm run build --silent
      - run: npm run db:migrate --workspace=apps/api --silent
      - name: Capture tests
        shell: bash
        run: |
          set +e
          npm test > pr63-final-test.log 2>&1
          echo $? > pr63-final-test.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr63-final-test-diagnostics
          path: |
            pr63-final-test.log
            pr63-final-test.status
      - name: Enforce tests
        shell: bash
        run: exit "$(cat pr63-final-test.status)"
