name: PR4-5 Web Typecheck

on:
  pull_request:
    branches:
      - feature/persistent-game-jobs

jobs:
  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: npm
      - run: npm ci --silent
      - run: npm run build:contracts --silent
      - name: Capture web typecheck
        shell: bash
        run: |
          set +e
          npx ngc -p apps/web/tsconfig.app.json --noEmit > web-typecheck.log 2>&1
          echo $? > web-typecheck.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr4-5-web-typecheck
          path: |
            web-typecheck.log
            web-typecheck.status
      - name: Enforce web typecheck
        shell: bash
        run: exit "$(cat web-typecheck.status)"
