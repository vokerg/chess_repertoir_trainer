name: PR63 Flake Diagnostics

on:
  pull_request:
    branches:
      - feature/persistent-game-jobs

jobs:
  flake-diagnostics:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chess_trainer_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d chess_trainer_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
      WEB_API_BASE_URL: /api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npm run build --silent
      - run: npm run db:migrate --workspace=apps/api --silent
      - name: Capture full suite
        shell: bash
        run: |
          set +e
          npm test > pr63-full-test.log 2>&1
          echo $? > pr63-full-test.status
          exit 0
      - name: Stress cancellation test
        shell: bash
        run: |
          set +e
          : > pr63-cancellation-stress.log
          status=0
          for attempt in 1 2 3 4 5; do
            echo "=== attempt $attempt ===" >> pr63-cancellation-stress.log
            node apps/api/test/jobs/job-worker-cancellation.test.mjs >> pr63-cancellation-stress.log 2>&1 || status=$?
            if [ "$status" -ne 0 ]; then break; fi
          done
          echo "$status" > pr63-cancellation-stress.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr63-flake-diagnostics
          path: |
            pr63-full-test.log
            pr63-full-test.status
            pr63-cancellation-stress.log
            pr63-cancellation-stress.status
      - name: Enforce diagnostics
        shell: bash
        run: |
          test "$(cat pr63-full-test.status)" = 0
          test "$(cat pr63-cancellation-stress.status)" = 0
