name: PR63 Apply Review Fixes V2

on:
  pull_request:
    branches:
      - feature/persistent-game-jobs

permissions:
  contents: write

jobs:
  apply-review-fixes:
    if: github.event.pull_request.head.ref == 'feature/persistent-game-jobs-pr6'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply verified review patch
        shell: bash
        run: |
          cat .github/pr63-patch/chunk-* > /tmp/pr63-review.patch.b64
          echo 'ee710d648a4cc9723374de1c4cfa1a21c23a0649d58b312e1656b5aa5f6d776a  /tmp/pr63-review.patch.b64' | sha256sum --check
          base64 --decode /tmp/pr63-review.patch.b64 > /tmp/pr63-review.patch
          echo '3a3d33b5dd175c254551688de7bb88ef53d7ae71499ff5c6ad5e3fc91490a1e6  /tmp/pr63-review.patch' | sha256sum --check
          git apply --check -p1 /tmp/pr63-review.patch
          git apply -p1 /tmp/pr63-review.patch
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/api/src/modules/analysis/analysis.repository.prisma.ts \
            apps/api/test/analysis/latest-analysis-snapshot.test.mjs \
            apps/api/test/jobs/job-worker-cancellation.test.mjs \
            docs/imported-game-job-processing.md
          git commit -m "fix(jobs): address final lifecycle review"
          git push origin HEAD:feature/persistent-game-jobs-pr6
