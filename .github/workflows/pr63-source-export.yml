name: PR63 Source Export

on:
  pull_request:
    branches:
      - feature/persistent-game-jobs

jobs:
  source-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: pr63-source-export
          path: |
            apps/api/src/modules/analysis/analysis.repository.prisma.ts
            apps/api/test/analysis/latest-analysis-snapshot.test.mjs
            apps/api/test/jobs/job-worker-cancellation.test.mjs
            docs/imported-game-job-processing.md
