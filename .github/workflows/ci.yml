name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chess_trainer_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d chess_trainer_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
      WEB_API_BASE_URL: /api

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Architecture guardrails
        run: npm run check:architecture

      - name: Apply database migrations
        run: npm run db:migrate --workspace=apps/api

      - name: Test
        run: npm test
