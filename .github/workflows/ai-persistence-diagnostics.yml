name: AI persistence diagnostics

on:
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    env:
      CI: true
      WEB_API_BASE_URL: /api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture AI widget test
        run: |
          set +e
          npm run test --workspace=apps/web -- --include='src/app/features/games/components/game-ai-review-widget.component.spec.ts' > widget.log 2>&1
          echo $? > widget.exit
          exit 0
      - name: Capture AI store test
        run: |
          set +e
          npm run test --workspace=apps/web -- --include='src/app/features/games/state/game-ai-review.store.spec.ts' > store.log 2>&1
          echo $? > store.exit
          exit 0
      - name: Capture AI page test
        run: |
          set +e
          npm run test --workspace=apps/web -- --include='src/app/features/games/pages/game-detail-page.component.spec.ts' > page.log 2>&1
          echo $? > page.exit
          exit 0
      - name: Upload Angular diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-angular-diagnostics
          path: |
            widget.log
            widget.exit
            store.log
            store.exit
            page.log
            page.exit
      - name: Diagnostic gate
        if: always()
        run: |
          test "$(cat widget.exit)" = 0
          test "$(cat store.exit)" = 0
          test "$(cat page.exit)" = 0
