name: Persistent Jobs Final Diagnostics

on:
  pull_request:
    branches:
      - main

jobs:
  capture-tests:
    if: github.event.pull_request.head.ref == 'feature/persistent-game-jobs'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chess_trainer_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d chess_trainer_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/chess_trainer_ci
      WEB_API_BASE_URL: /api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npm run build --silent
      - run: npm run db:migrate --workspace=apps/api --silent
      - name: Capture full test output
        shell: bash
        run: |
          set +e
          npm test > persistent-jobs-final-test.log 2>&1
          echo $? > persistent-jobs-final-test.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: persistent-jobs-final-test-output
          path: |
            persistent-jobs-final-test.log
            persistent-jobs-final-test.status
      - name: Enforce test result
        shell: bash
        run: exit "$(cat persistent-jobs-final-test.status)"
